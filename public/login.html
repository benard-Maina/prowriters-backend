<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ProWriter Solutions</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root{
      --bg:#f4f6f9;
      --card:#ffffff;
      --accent:#007bff;
      --danger:#dc3545;
      --muted:#6b7280;
      --radius:12px;
      --shadow: 0 6px 24px rgba(15,23,42,0.08);
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:
        radial-gradient(1200px 400px at 10% 10%, rgba(0,123,255,0.06), transparent 8%),
          <h1 id="loginTitle">Welcome to ProWriter</h1>
        var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:24px;
    }

    .login-page { width:100%; max-width:420px; }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:28px;
      box-shadow:var(--shadow);
      border:1px solid rgba(15,23,42,0.04);
    }

    .card h1{
      margin:0 0 18px 0;
      font-size:20px;
      color:#111827;
      text-align:center;
    }

    form{margin-top:6px}
    input[type="email"],
    input[type="password"]{
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid #e6e9ef;
      background:#fbfdff;
      outline:none;
      font-size:14px;
      margin:8px 0;
      transition:box-shadow .12s, border-color .12s;
    }
    input:focus{
      border-color:var(--accent);
      box-shadow:0 6px 18px rgba(0,123,255,0.08);
    }

    button[type="submit"]{
      width:100%;
      padding:12px 14px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      background:linear-gradient(180deg,var(--accent),#0062d6);
      color:#fff;
      font-weight:600;
      cursor:pointer;
      font-size:15px;
      transition:transform .08s ease, box-shadow .08s;
    }
    button[type="submit"]:active{ transform:translateY(1px) }
    button[type="submit"]:hover{ box-shadow:0 6px 18px rgba(0,123,255,0.12) }

    #message{
      margin:12px 0 0 0;
      font-size:13px;
      color:var(--muted);
      min-height:18px;
      text-align:center;
      word-break:break-word;
    }

    .links{ font-size:13px; color:var(--muted); text-align:center; margin-top:12px }
    .links a{ color:var(--accent); text-decoration:none; font-weight:600 }
    .links a:hover{ text-decoration:underline }

    @media (prefers-reduced-motion: reduce){
      *{transition:none!important}
    }

    /* small focus visible helper */
    input:focus, button:focus { outline: 3px solid rgba(0,123,255,0.12); outline-offset:2px; }
    @media (max-width: 480px) {
      input, button { font-size: 16px; padding: 12px; }
      .login-page { padding: 12px; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <a class="site-logo-link" href="index.html" aria-label="ProWriters home"><img src="logo.png" class="site-logo" alt="ProWriters Solutions logo"></a>
  <main class="login-page">
    <div class="card" role="region" aria-labelledby="loginTitle">
      <h1 id="loginTitle">Login to ProWriter</h1>

      <form id="loginForm" autocomplete="on" novalidate>
        <input type="email" id="email" placeholder="Email" required autocomplete="email" inputmode="email" />
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password" />
        <button type="submit">Login</button>
      </form>

      <p id="message" role="status" aria-live="polite"></p>

      <!-- Verification flow removed -->
      <p class="links">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    // Show role hint when opened with ?role=admin
    (function(){
      try {
        const params = new URLSearchParams(window.location.search || '');
        const role = params.get('role');
        if (role === 'admin') {
          message.textContent = "🔒 Admin login — you'll be taken to the Admin Dashboard after signing in.";
        }
      } catch (e) {}
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.textContent = 'Checking credentials...';

      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      try {
        // determine API base: use central API in production (api.prowriter.me)
        // and same-origin in local/dev to avoid CORS issues.
        function apiBase() {
          try {
            const host = window.location && window.location.hostname;
            if (host && (host === 'prowriter.me' || host === 'www.prowriter.me' || host.endsWith('.prowriter.me'))) {
              return 'https://api.prowriter.me';
            }
            if (window.location && window.location.origin) return window.location.origin;
            return 'https://api.prowriter.me';
          } catch (e) { return 'https://api.prowriter.me'; }
        }
        const apiUrl = `${apiBase()}/api/login`;

        // add a 10s timeout to avoid infinite waits if API is unreachable
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);
        let res;
        try {
          res = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
            signal: controller.signal
          });
        } catch (fetchErr) {
          if (fetchErr.name === 'AbortError') {
            message.textContent = '⚠️ Request timed out. Please check your network.';
          } else {
            message.textContent = `⚠️ Network error: ${fetchErr.message || 'Failed to reach server'}`;
          }
          clearTimeout(timeout);
          return;
        } finally { clearTimeout(timeout); }

        let payload = null;
        const ct = (res.headers && res.headers.get) ? (res.headers.get('content-type') || '') : '';
        if (!ct.toLowerCase().includes('application/json')) {
          const text = await res.text().catch(() => null);
          payload = { message: text || res.statusText || 'Server error' };
        } else {
          payload = await res.json();
        }

        if (!res.ok) {
          message.textContent = payload.message || '⚠️ Login failed.';
          return;
        }

        const user = payload.user || payload;
        const token = payload.token || null;
        message.textContent = '✅ Login successful! Redirecting...';
        localStorage.setItem('user', JSON.stringify(user));
        if (token) localStorage.setItem('token', token);

        setTimeout(() => {
          if (user.role === 'admin') {
            window.location.href = 'admin-dashboard.html';
          } else if (user.role === 'writer' || user.role === 'employee') {
            window.location.href = 'writer-dashboard.html';
          } else {
            window.location.href = 'client-dashboard.html';
          }
        }, 800);
      } catch (err) {
        console.error(err);
        message.textContent = `⚠️ ${err.message || 'Network or server error.'}`;
      }
    });

    // Verification flow removed from client
  </script>
</body>
</html>
